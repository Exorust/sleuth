name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: uv pip install --system -e '.[dev]'
      - name: Ruff
        run: ruff check src tests eval
      - name: Pytest
        run: pytest -v

  viewer:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: viewer } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npm run build
      - name: Verify demo rendered
        run: |
          test -f dist/index.html
          grep -q "why did checkout" dist/index.html
          grep -q ">KEY<" dist/index.html
